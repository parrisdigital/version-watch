name: Bug report
description: Report reproducible broken behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include URLs, filters, API requests, or commands where useful.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Screenshots, response snippets, logs without secrets, or related source links.


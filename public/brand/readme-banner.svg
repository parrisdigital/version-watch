<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Version Watch</title>
  <desc id="desc">A full-width README banner for Version Watch, a change intelligence tool for developer platform updates.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.48" stop-color="#0b1324"/>
      <stop offset="1" stop-color="#111c3a"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 118) rotate(144) scale(366 214)">
      <stop stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(204 338) rotate(-16) scale(360 180)">
      <stop stop-color="#22d3ee" stop-opacity="0.28"/>
